name: Full build Domeport Pro 

on:
  push:
    branches: [ dev, develop ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Package Custom App - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            artifact-name: linux-x86_64
          - os: macos-latest
            platform: macos-arm
            artifact-name: macos-arm
          - os: windows-latest
            platform: windows
            artifact-name: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: ossia score build
        id: score
        uses: ossia/actions/custom-score-build@master
        with:
          cmake-options: >
            -DSCORE_ENABLED_ADDONS=score-addon-ndi
            -DSCORE_DISABLE_PLUGINS=score-plugin-avnd,score-plugin-clap,score-plugin-controlsurface,score-plugin-faust,score-plugin-jit,score-plugin-lv2,score-plugin-mapping,score-plugin-nodal,score-plugin-packagemanager,score-plugin-pd,score-plugin-recording,score-plugin-remotecontrol,score-plugin-spline,score-plugin-spline3d,score-plugin-threedim,score-plugin-vst,score-plugin-vst3,score-plugin-ysfx
          macos-certificate-base64: ${{ secrets.MAC_CERT_B64 }}
          macos-certificate-password: ${{ secrets.MAC_CERT_PASSWORD }}
          macos-notarize-team-id: ${{ secrets.MAC_NOTARIZE_TEAM_ID }}
          macos-notarize-apple-id: ${{ secrets.MAC_NOTARIZE_APPLE_ID }}
          macos-notarize-password: ${{ secrets.MAC_NOTARIZE_PASSWORD }}
          score-repo: ogauthiersat/score
          score-ref: sound-process-video-file

      - name: Package custom ossia score app
        uses: ossia/actions/package-custom-app@master
        with:
          app-name: "Domeport Pro"
          qml-files: "qml"
          # Optional: Add your score file here
          score-file: "score/app.score"
          score-build-id: ${{ steps.score.outputs.artifact-id }}
          platforms: "${{ matrix.platform }}"
          # App metadata
          app-organization: "SAT"
          app-domain: "sat.qc.ca"
          app-identifier: "ca.qc.sat.domeportpro"
          app-description: "Domemaster / equirectangular content visualizer for dome and planetariums in 3D environment"
          app-copyright: "Société des Arts Technologiques"
          app-version: "1.0"
          app-png: "qml/domeportpro/resources/images/DomeportPro.png"
          app-ico: "qml/domeportpro/resources/images/DomeportPro.ico"
          app-icns: "qml/domeportpro/resources/images/DomeportPro.icns"
          app-environment: environment
          # Optional: macOS code signing (requires secrets to be set in repository)
          macos-certificate-base64: ${{ secrets.MAC_CERT_B64 }}
          macos-certificate-password: ${{ secrets.MAC_CERT_PASSWORD }}
          macos-notarize-team-id: ${{ secrets.MAC_NOTARIZE_TEAM_ID }}
          macos-notarize-apple-id: ${{ secrets.MAC_NOTARIZE_APPLE_ID }}
          macos-notarize-password: ${{ secrets.MAC_NOTARIZE_PASSWORD }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: domeportpro-basic-${{ matrix.artifact-name }}
          path: packages/
          retention-days: 30

      - name: Package custom ossia score app
        uses: ossia/actions/package-custom-app@master
        with:
          app-name: "Domeport Pro"
          qml-files: "qml"
          # Optional: Add your score file here
          score-file: "score/app.score"
          score-build-id: ${{ steps.score.outputs.artifact-id }}
          platforms: "${{ matrix.platform }}"
          # App metadata
          app-organization: "SAT"
          app-domain: "sat.qc.ca"
          app-identifier: "ca.qc.sat.domeportpro"
          app-description: "Domemaster / equirectangular content visualizer for dome and planetariums in 3D environment"
          app-copyright: "Société des Arts Technologiques"
          app-version: "1.0"
          app-png: "qml/domeportpro/resources/images/DomeportPro.png"
          app-ico: "qml/domeportpro/resources/images/DomeportPro.ico"
          app-icns: "qml/domeportpro/resources/images/DomeportPro.icns"
          # Optional: macOS code signing (requires secrets to be set in repository)
          macos-certificate-base64: ${{ secrets.MAC_CERT_B64 }}
          macos-certificate-password: ${{ secrets.MAC_CERT_PASSWORD }}
          macos-notarize-team-id: ${{ secrets.MAC_NOTARIZE_TEAM_ID }}
          macos-notarize-apple-id: ${{ secrets.MAC_NOTARIZE_APPLE_ID }}
          macos-notarize-password: ${{ secrets.MAC_NOTARIZE_PASSWORD }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: domeportpro-${{ matrix.artifact-name }}
          path: packages/
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/develop'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-packages
          pattern: domeportpro-basic-*
          merge-multiple: true

      - name: Create Release (on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: all-packages/*
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Upload to Continuous Release (on dev/develop)
        if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/develop'
        uses: softprops/action-gh-release@v2
        with:
          name: "Continuous Build"
          tag_name: "continuous"
          files: all-packages/*
          draft: false
          prerelease: true
          generate_release_notes: false
